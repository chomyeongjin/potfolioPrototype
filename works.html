<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A minimalist portfolio website inspired by modern editorial layouts.">
    <title>PORTFOLIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <header class="header">
        <h1 class="logo"><a href="#">PORTFOLIO</a></h1>

            <button class="menu-toggle" aria-label="Toggle Menu">
                <span></span>

            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="gallery">
            <div class="uniform-grid">
                <a href="project-1.html" class="grid-item">

                    </div>
                </a>
                <div class="grid-item">
                    <img src="./sources/IMG_0219.webp" alt="Portfolio Image 2" loading="lazy">

                        <p>Artist Name</p>

                </div>
                <div class="grid-item">

                    <div class="hover-overlay">
                        <h3>Project Name</h3>
                        <p>Artist Name</p>
                        <p>Location</p>
                        <p>Date</p>
                    </div>
                </div>
                <div class="grid-item">
                    <img src="./sources/IMG_6615.webp" alt="Portfolio Image 5" loading="lazy">
                    <div class="hover-overlay">
                        <h3>Project Name</h3>
                        <p>Artist Name</p>
                        <p>Location</p>
                        <p>Date</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Simple menu toggle for mobile
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
            this.classList.toggle('open');
        });
    </script>
</body>
</html>
