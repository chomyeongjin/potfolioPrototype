<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - Project Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <header class="header">
        <h1 class="logo"><a href="index.html">PORTFOLIO</a></h1>
        <nav class="nav">
            <button class="menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Monthly Archive</a></li>
                <li><a href="works.html" style="font-weight: 600; color: var(--text-color);">Works</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content project-detail">
        <div class="project-info">
            <div class="info-row">
                <span class="info-label">Project</span>
                <span class="info-value">Project Name</span>
            </div>
            <div class="info-row">
                <span class="info-label">Artist</span>
                <span class="info-value">Artist Name</span>
            </div>
            <div class="info-row">
                <span class="info-label">Location</span>
                <span class="info-value">Location</span>
            </div>
            <div class="info-row">
                <span class="info-label">Date</span>
                <span class="info-value">Date</span>
            </div>
        </div>

        <div class="carousel-container">
            <button class="carousel-btn prev-btn" aria-label="Previous image">&#10094;</button>
            <div class="carousel-track-container">
                <ul class="carousel-track">
                    <li class="carousel-slide">
                        <img src="./sources/DJI_0198.webp" alt="Project Image 1">
                    </li>
                    <li class="carousel-slide">
                        <img src="./sources/IMG_6457.webp" alt="Project Image 2">
                    </li>
                    <li class="carousel-slide">
                        <img src="./sources/IMG_6615.webp" alt="Project Image 3">
                    </li>
                </ul>
            </div>
            <button class="carousel-btn next-btn" aria-label="Next image">&#10095;</button>
        </div>
    </main>

    <script>
        // Menu toggle
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
            this.classList.toggle('open');
        });

        // Carousel logic
        const track = document.querySelector('.carousel-track');
        const slides = Array.from(track.children);
        const nextButton = document.querySelector('.next-btn');
        const prevButton = document.querySelector('.prev-btn');

        let currentSlideIndex = 0;

        const updateSlidePosition = () => {
            const slideWidth = slides[0].getBoundingClientRect().width;
            track.style.transform = 'translateX(-' + slideWidth * currentSlideIndex + 'px)';
        };

        nextButton.addEventListener('click', () => {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
            } else {
                currentSlideIndex = 0; // Loop back to first
            }
            updateSlidePosition();
        });

        prevButton.addEventListener('click', () => {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
            } else {
                currentSlideIndex = slides.length - 1; // Loop back to last
            }
            updateSlidePosition();
        });
        
        // Ensure accurate position on resize
        window.addEventListener('resize', () => {
            // slightly delay to ensure width is recalculated
            setTimeout(updateSlidePosition, 50);
        });
    </script>
</body>
</html>
